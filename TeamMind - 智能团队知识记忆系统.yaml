name: TeamMind
title: 智能团队知识记忆系统
summary: >
  TeamMind 是一个 AI Native 的团队知识记忆系统，通过多 Agent 协作和混合知识库，
  帮助小型团队记录、理解、关联并检索分散在消息、会议、文档和任务中的知识。
target_users:
  - 中小团队
  - 新入职成员
  - 需要追溯历史决策的项目负责人
pain_points:
  - name: 信息碎片化
    description: 知识散落在 Slack、邮件、会议纪要和文档等渠道，跨平台查找效率低。
  - name: 知识断层
    description: 老员工离职或项目重启时，历史决策背景和隐性经验容易丢失。
  - name: 上下文割裂
    description: 任务、决策、文档之间缺少显式关联，导致重复讨论和决策反复。
architecture:
  orchestrator: 识别意图、拆解任务、调度专业 Agent。
  store_flow:
    - Extract: 提取实体、信息类型和关键点。
    - Comprehend: 生成摘要、识别决策和行动项。
    - Relate: 分析实体关系并生成图谱关系。
    - Store: 写入向量库和图数据库。
  query_flow:
    - Query Rewrite
    - Hybrid Retrieval
    - Context Fusion
    - Answer Generation
tech_stack:
  llm: Claude API
  vector_database: Qdrant
  graph_database: Neo4j
  api: FastAPI
  demo_ui: Streamlit
  automation: n8n
status:
  current: 可运行基线
  completed:
    - Agent 数据结构和最小编排
    - Qdrant/Neo4j 适配层
    - Streamlit 示例界面
    - CLI 本地规则 fallback
    - FastAPI health/plan/query 入口
    - pytest 最小测试基线
  next_steps:
    - Slack/Notion 自动化摄入
    - 真实 LLM 端到端集成测试
    - API 鉴权和多团队权限模型
    - 更完整的混合检索与答案引用
